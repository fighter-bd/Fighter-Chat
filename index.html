<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fighter Chat</title>
    <!-- Tailwind CSS CDN for modern utility styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Discord-like icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #313338; /* Discord dark background */
        }
        /* Custom scrollbar matching Discord style */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #2b2d31;
        }
        ::-webkit-scrollbar-thumb {
            background: #1a1b1e;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #111214;
        }
        /* Smooth fade animations */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-gray-200 h-screen overflow-hidden flex flex-col justify-center items-center">

    <!-- =========================================================================
         1. AUTHENTICATION SCREEN (Login / Signup / Forgot Password)
         ========================================================================= -->
    <div id="auth-screen" class="w-full max-w-md p-8 bg-[#1e1f22] rounded-lg shadow-xl border border-gray-800 fade-in dynamic-view">
        <!-- Brand / Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-[#5865f2] rounded-full text-white text-3xl mb-3 shadow-lg">
                <i class="fa-solid fa-hand-fist animate-bounce"></i>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-wide" id="auth-title">Welcome Back!</h1>
            <p class="text-gray-400 text-sm mt-1" id="auth-subtitle">We're so excited to see you again!</p>
        </div>

        <!-- Alert Notification Box -->
        <div id="auth-alert" class="hidden mb-4 p-3 rounded text-sm font-medium transition-all duration-300"></div>

        <!-- Dynamic Form -->
        <form id="auth-form" onsubmit="handleAuthSubmit(event)">
            <!-- Username Input (Hidden during login/reset) -->
            <div id="username-group" class="hidden mb-4">
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500"><i class="fa-solid fa-user"></i></span>
                    <input type="text" id="auth-username" class="w-full bg-[#111214] border border-transparent focus:border-[#5865f2] rounded p-2.5 pl-10 text-white focus:outline-none transition" placeholder="fighter_01">
                </div>
            </div>

            <!-- Email Input -->
            <div class="mb-4">
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" id="auth-email" required class="w-full bg-[#111214] border border-transparent focus:border-[#5865f2] rounded p-2.5 pl-10 text-white focus:outline-none transition" placeholder="name@domain.com">
                </div>
            </div>

            <!-- Password Input -->
            <div id="password-group" class="mb-4">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-gray-400">Password</label>
                    <button type="button" onclick="switchAuthMode('forgot')" id="btn-forgot-link" class="text-xs text-[#00a8fc] hover:underline focus:outline-none">Forgot your password?</button>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="auth-password" class="w-full bg-[#111214] border border-transparent focus:border-[#5865f2] rounded p-2.5 pl-10 text-white focus:outline-none transition" placeholder="••••••••">
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="auth-submit-btn" class="w-full bg-[#5865f2] hover:bg-[#4752c4] text-white font-medium p-2.5 rounded transition shadow-md flex justify-center items-center gap-2">
                <span>Log In</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>

        <!-- Footer Toggle Links -->
        <div class="mt-6 text-sm text-gray-400 text-center" id="auth-footer">
            Need an account? <button onclick="switchAuthMode('signup')" class="text-[#00a8fc] hover:underline focus:outline-none">Register</button>
        </div>
    </div>


    <!-- =========================================================================
         2. MAIN CHAT APPLICATION INTERFACE (Discord Style Workspace)
         ========================================================================= -->
    <div id="chat-screen" class="hidden w-full h-full flex overflow-hidden fade-in dynamic-view">
        
        <!-- Leftmost Sidebar: Server Icons / Actions -->
        <div class="w-16 bg-[#1e1f22] flex flex-col items-center py-3 gap-2 border-r border-[#111214]">
            <div class="w-12 h-12 bg-[#5865f2] rounded-2xl flex items-center justify-center text-white text-xl font-bold cursor-pointer transition-all duration-200 hover:rounded-xl shadow" title="Fighter Chat Premium">
                <i class="fa-solid fa-hand-fist"></i>
            </div>
            <div class="w-8 h-0.5 bg-gray-700 rounded my-1"></div>
            <!-- Add Room Action -->
            <button onclick="openCreateRoomModal()" class="w-12 h-12 bg-[#313338] text-[#23a55a] rounded-3xl flex items-center justify-center text-xl cursor-pointer transition-all duration-200 hover:rounded-xl hover:bg-[#23a55a] hover:text-white" title="Create a Room">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>

        <!-- Second Sidebar: Channel / Room List & Current User Profile -->
        <div class="w-60 bg-[#2b2d31] flex flex-col justify-between border-r border-[#232428]">
            <div>
                <!-- Header Status -->
                <div class="p-3 shadow-sm border-b border-[#1f2023] flex justify-between items-center bg-[#2b2d31]">
                    <span class="font-bold text-white text-sm tracking-wide">FIGHTER ARENA</span>
                    <i class="fa-solid fa-chevron-down text-gray-400 text-xs cursor-pointer"></i>
                </div>
                <!-- Rooms Section Container -->
                <div class="p-2">
                    <div class="flex justify-between items-center text-gray-400 font-bold text-xs uppercase px-2 py-1 tracking-wider">
                        <span>Text Channels</span>
                    </div>
                    <div id="rooms-list" class="mt-1 space-y-0.5 max-h-[70vh] overflow-y-auto">
                        <div class="text-xs text-gray-500 p-2 text-center">Loading arenas...</div>
                    </div>
                </div>
            </div>

            <!-- Current Logged In User Bottom Bar -->
            <div class="bg-[#232428] p-2 flex items-center justify-between">
                <div class="flex items-center gap-2 overflow-hidden">
                    <div class="relative">
                        <img id="user-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=fighter" alt="Avatar" class="w-8 h-8 rounded-full bg-gray-800">
                        <div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-[#23a55a] rounded-full border-2 border-[#232428]"></div>
                    </div>
                    <div class="flex flex-col overflow-hidden">
                        <span id="user-display-name" class="text-sm font-semibold text-white truncate leading-tight">Fighter</span>
                        <span class="text-[10px] text-gray-400 truncate">Online</span>
                    </div>
                </div>
                <!-- Settings/Logout Controls -->
                <div class="flex items-center gap-1 text-gray-400">
                    <button onclick="handleLogout()" class="p-1.5 hover:bg-gray-700 hover:text-red-400 rounded transition" title="Log Out">
                        <i class="fa-solid fa-arrow-right-from-bracket text-sm"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Center Chat Feed Pane -->
        <div class="flex-1 bg-[#313338] flex flex-col justify-between h-full relative">
            <!-- Active Channel Header -->
            <div class="h-12 border-b border-[#232428] shadow-sm flex items-center justify-between px-4 bg-[#313338]">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-hashtag text-gray-400 text-xl"></i>
                    <span id="active-room-title" class="font-bold text-white">welcome-arena</span>
                </div>
                <div class="text-gray-400 flex items-center gap-4">
                    <i class="fa-solid fa-bell cursor-pointer hover:text-gray-200" title="Notifications"></i>
                    <i class="fa-solid fa-users cursor-pointer hover:text-gray-200" title="Member List"></i>
                </div>
            </div>

            <!-- Scrollable Chat Messages Feed Area -->
            <div id="messages-feed" class="flex-1 overflow-y-auto p-4 space-y-4">
                <div class="h-full flex flex-col items-center justify-center text-gray-500 text-sm gap-2">
                    <i class="fa-solid fa-comments text-4xl text-gray-600"></i>
                    <p>Select an arena channel from the sidebar to begin fighting!</p>
                </div>
            </div>

            <!-- Message Action input wrapper layout bar -->
            <div class="p-4 pt-0 bg-[#313338]">
                <form id="message-form" onsubmit="handleSendMessage(event)" class="w-full">
                    <div class="bg-[#383a40] rounded-lg flex items-center px-4 py-2.5 focus-within:ring-1 focus-within:ring-[#5865f2] transition">
                        <button type="button" class="text-gray-400 hover:text-gray-200 mr-3"><i class="fa-solid fa-circle-plus text-lg"></i></button>
                        <input type="text" id="message-input" required disabled class="w-full bg-transparent text-gray-200 placeholder-gray-500 focus:outline-none text-sm" placeholder="Message #welcome-arena">
                        <button type="submit" class="text-gray-400 hover:text-[#5865f2] ml-3 transition"><i class="fa-solid fa-paper-plane text-lg"></i></button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- =========================================================================
         3. DIALOG MODAL LAYERS (Create Channel Room Overlay)
         ========================================================================= -->
    <div id="create-room-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4 transition-all duration-300">
        <div class="bg-[#313338] border border-gray-800 rounded-lg max-w-md w-full overflow-hidden shadow-2xl scale-95 transition-transform duration-300">
            <div class="p-5">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold text-white">Create Text Channel</h3>
                    <button onclick="closeCreateRoomModal()" class="text-gray-400 hover:text-gray-200"><i class="fa-solid fa-xmark text-lg"></i></button>
                </div>
                <div class="mb-4">
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Channel Name</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500"><i class="fa-solid fa-hashtag"></i></span>
                        <input type="text" id="new-room-name" required class="w-full bg-[#1e1f22] border border-transparent focus:border-[#5865f2] rounded p-2.5 pl-8 text-white focus:outline-none transition" placeholder="new-arena">
                    </div>
                </div>
            </div>
            <div class="bg-[#2b2d31] px-5 py-3 flex justify-end gap-3">
                <button type="button" onclick="closeCreateRoomModal()" class="text-sm text-white hover:underline px-4 py-2">Cancel</button>
                <button type="button" onclick="handleCreateRoomSubmit()" class="bg-[#5865f2] hover:bg-[#4752c4] text-white font-medium text-sm px-5 py-2 rounded transition shadow-md">Create Channel</button>
            </div>
        </div>
    </div>


    <!-- =========================================================================
         4. FIREBASE SDK IMPORTS & CORE SYSTEM JAVASCRIPT
         ========================================================================= -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // -------------------------------------------------------------------------
        // REAL FIREBASE CREDENTIALS APPLIED SUCCESFULLY
        // -------------------------------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyCvTIQzwht0L65C2tk0MF6u05ckadwoRV8",
            authDomain: "fighter-chatroom.firebaseapp.com",
            projectId: "fighter-chatroom",
            storageBucket: "fighter-chatroom.firebasestorage.app",
            messagingSenderId: "1022521157335",
            appId: "1:1022521157335:web:7997fafa3061dfcb053292",
            measurementId: "G-E2J6X81JBH"
        };

        // Initialize App Ecosystem
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Application Global Memory State 
        let currentAuthMode = 'login'; 
        let activeRoomId = null;
        let unsubscribeMessages = null;

        // Session Lifecycle Watcher (Auto Login Verification)
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('chat-screen').classList.remove('hidden');
                
                document.getElementById('user-display-name').innerText = user.displayName || user.email.split('@')[0];
                document.getElementById('user-avatar').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${user.uid}`;
                
                listenToChannelsList();
            } else {
                if(unsubscribeMessages) { unsubscribeMessages(); unsubscribeMessages = null; }
                document.getElementById('chat-screen').classList.add('hidden');
                document.getElementById('auth-screen').classList.remove('hidden');
                switchAuthMode('login');
            }
        });

        // Presentation Layout Transitions
        function switchAuthMode(mode) {
            currentAuthMode = mode;
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const uGroup = document.getElementById('username-group');
            const pGroup = document.getElementById('password-group');
            const submitBtn = document.getElementById('auth-submit-btn');
            const footer = document.getElementById('auth-footer');
            const forgotLink = document.getElementById('btn-forgot-link');
            const alertBox = document.getElementById('auth-alert');
            
            alertBox.classList.add('hidden');

            if (mode === 'login') {
                title.innerText = "Welcome Back!";
                subtitle.innerText = "We're so excited to see you again!";
                uGroup.classList.add('hidden');
                pGroup.classList.remove('hidden');
                forgotLink.classList.remove('hidden');
                submitBtn.innerHTML = `<span>Log In</span><i class="fa-solid fa-arrow-right-to-bracket"></i>`;
                footer.innerHTML = `Need an account? <button type="button" onclick="switchAuthMode('signup')" class="text-[#00a8fc] hover:underline focus:outline-none">Register</button>`;
            } else if (mode === 'signup') {
                title.innerText = "Create an account";
                subtitle.innerText = "Join the ultimate arena today!";
                uGroup.classList.remove('hidden');
                pGroup.classList.remove('hidden');
                forgotLink.classList.add('hidden');
                submitBtn.innerHTML = `<span>Continue</span><i class="fa-solid fa-user-plus"></i>`;
                footer.innerHTML = `Already have an account? <button type="button" onclick="switchAuthMode('login')" class="text-[#00a8fc] hover:underline focus:outline-none">Log In</button>`;
            } else if (mode === 'forgot') {
                title.innerText = "Reset Password";
                subtitle.innerText = "Enter email to receive instructions.";
                uGroup.classList.add('hidden');
                pGroup.classList.add('hidden');
                submitBtn.innerHTML = `<span>Send Reset Email</span><i class="fa-solid fa-paper-plane"></i>`;
                footer.innerHTML = `Back to <button type="button" onclick="switchAuthMode('login')" class="text-[#00a8fc] hover:underline focus:outline-none">Log In</button>`;
            }
        }

        function showAlert(msg, isSuccess = false) {
            const alertBox = document.getElementById('auth-alert');
            alertBox.innerText = msg;
            alertBox.className = `p-3 mb-4 rounded text-sm font-medium fade-in ${isSuccess ? 'bg-[#23a55a]/20 text-[#23a55a]' : 'bg-[#f23f43]/20 text-[#f23f43]'}`;
        }

        // Authentication Handler
        async function handleAuthSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            const username = document.getElementById('auth-username').value.trim();

            if (currentAuthMode === 'signup') {
                if(username.length < 3) return showAlert("Username must be at least 3 characters long.");
                if(password.length < 6) return showAlert("Password must be at least 6 characters long.");

                try {
                    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                    await userCredential.user.updateProfile({ displayName: username });
                    
                    await db.collection('users').doc(userCredential.user.uid).set({
                        uid: userCredential.user.uid,
                        username: username,
                        email: email,
                        avatar: `https://api.dicebear.com/7.x/bottts/svg?seed=${userCredential.user.uid}`,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch(err) {
                    showAlert(err.message);
                }
            } else if (currentAuthMode === 'login') {
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch(err) {
                    showAlert(err.message);
                }
            } else if (currentAuthMode === 'forgot') {
                try {
                    await auth.sendPasswordResetEmail(email);
                    showAlert("Reset link transmitted! Check your mailbox.", true);
                } catch(err) {
                    showAlert(err.message);
                }
            }
        }

        function handleLogout() {
            auth.signOut();
        }

        // Channels Syncing Logic
        function listenToChannelsList() {
            db.collection('rooms').orderBy('createdAt', 'asc').onSnapshot((snapshot) => {
                const listContainer = document.getElementById('rooms-list');
                listContainer.innerHTML = '';
                
                if(snapshot.empty) {
                    listContainer.innerHTML = `<div class="text-xs text-gray-500 p-2 text-center">No arenas built yet.</div>`;
                    return;
                }

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const isSelected = doc.id === activeRoomId;
                    const item = document.createElement('div');
                    item.className = `flex items-center justify-between px-2 py-1.5 rounded text-sm cursor-pointer transition group ${isSelected ? 'bg-[#404249] text-white' : 'text-gray-400 hover:bg-[#35373c] hover:text-gray-200'}`;
                    item.setAttribute('onclick', `switchActiveChannel('${doc.id}', '${data.name}')`);
                    item.innerHTML = `
                        <div class="flex items-center gap-1.5 truncate">
                            <i class="fa-solid fa-hashtag text-gray-500"></i>
                            <span class="truncate font-medium">${data.name}</span>
                        </div>
                    `;
                    listContainer.appendChild(item);
                });

                if(!activeRoomId && snapshot.docs.length > 0) {
                    const firstDoc = snapshot.docs[0];
                    switchActiveChannel(firstDoc.id, firstDoc.data().name);
                }
            }, err => console.error("Room sync failure: ", err));
        }

        function openCreateRoomModal() {
            document.getElementById('create-room-modal').classList.remove('hidden');
        }
        function closeCreateRoomModal() {
            document.getElementById('create-room-modal').classList.add('hidden');
            document.getElementById('new-room-name').value = '';
        }

        async function handleCreateRoomSubmit() {
            const nameInput = document.getElementById('new-room-name').value.trim().toLowerCase().replace(/\s+/g, '-');
            if(!nameInput) return;

            try {
                const newDocRef = await db.collection('rooms').add({
                    name: nameInput,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    createdBy: auth.currentUser.uid
                });
                closeCreateRoomModal();
                switchActiveChannel(newDocRef.id, nameInput);
            } catch(err) {
                console.error("Room addition matrix execution error: ", err);
            }
        }

        // Messaging Control Logic
        function switchActiveChannel(roomId, roomName) {
            activeRoomId = roomId;
            document.getElementById('active-room-title').innerText = roomName;
            
            const msgInput = document.getElementById('message-input');
            msgInput.disabled = false;
            msgInput.placeholder = `Message #${roomName}`;

            if (unsubscribeMessages) unsubscribeMessages();
            listenToMessagesFeed(roomId);
        }

        function listenToMessagesFeed(roomId) {
            const feed = document.getElementById('messages-feed');
            feed.innerHTML = `<div class="h-full flex items-center justify-center text-gray-500 text-sm"><i class="fa-solid fa-circle-notch animate-spin mr-2"></i> Syncing channel stream...</div>`;

            unsubscribeMessages = db.collection('rooms').doc(roomId).collection('messages')
                .orderBy('timestamp', 'asc')
                .onSnapshot((snapshot) => {
                    feed.innerHTML = '';
                    if (snapshot.empty) {
                        feed.innerHTML = `
                            <div class="h-full flex flex-col items-center justify-center text-gray-500 text-sm gap-2">
                                <i class="fa-solid fa-paper-plane text-3xl text-gray-600"></i>
                                <p>Welcome to the beginning of the #${document.getElementById('active-room-title').innerText} channel!</p>
                            </div>`;
                        return;
                    }

                    snapshot.forEach((doc) => {
                        const msg = doc.data();
                        const card = document.createElement('div');
                        card.className = "flex items-start gap-4 hover:bg-[#2e3035]/30 p-1 px-2 rounded group transition duration-150 fade-in";
                        
                        let timeString = "Just Now";
                        if(msg.timestamp) {
                            const date = msg.timestamp.toDate();
                            timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        }

                        card.innerHTML = `
                            <img src="${msg.userAvatar || 'https://api.dicebear.com/7.x/bottts/svg?seed=fallback'}" class="w-10 h-10 rounded-full bg-[#1e1f22] mt-0.5" alt="User Avatar">
                            <div class="flex flex-col">
                                <div class="flex items-baseline gap-2">
                                    <span class="font-semibold text-white text-sm hover:underline cursor-pointer">${msg.userName}</span>
                                    <span class="text-[10px] text-gray-400 font-medium">${timeString}</span>
                                </div>
                                <p class="text-sm text-gray-300 mt-0.5 break-all select-text">${escapeHTML(msg.content)}</p>
                            </div>
                        `;
                        feed.appendChild(card);
                    });
                    feed.scrollTop = feed.scrollHeight;
                }, err => {
                    console.error("Message stream failure: ", err);
                });
        }

        async function handleSendMessage(e) {
            e.preventDefault();
            const inputField = document.getElementById('message-input');
            const content = inputField.value.trim();
            
            if(!content || !activeRoomId) return;
            inputField.value = '';

            try {
                await db.collection('rooms').doc(activeRoomId).collection('messages').add({
                    content: content,
                    userId: auth.currentUser.uid,
                    userName: auth.currentUser.displayName || auth.currentUser.email.split('@')[0],
                    userAvatar: `https://api.dicebear.com/7.x/bottts/svg?seed=${auth.currentUser.uid}`,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch(err) {
                console.error("Message send failure: ", err);
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
